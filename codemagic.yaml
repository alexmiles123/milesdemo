workflows:
  ios-release:
    name: Monument iOS
    max_build_duration: 120
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
        - $CM_BUILD_DIR/ios/App/Pods
    scripts:
      - name: Install dependencies
        script: npm ci --no-audit --no-fund --prefer-offline
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          # List what got uploaded so the build log shows which cert + profile
          # Codemagic resolved. Helps debug "requires a provisioning profile"
          # errors caused by team-id / bundle-id mismatches.
          keychain list-certificates
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true
          xcode-project use-profiles --verbose
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
